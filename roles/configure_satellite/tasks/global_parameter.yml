- name: "Add Global Parameters"
  redhat.satellite.global_parameters:
    username: "{{ satellite_username | default(omit) }}"
    password: "{{ satellite_password | default(omit) }}"
    server_url: "{{ satellite_server_url | default(omit) }}"
    validate_certs: "{{ satellite_validate_certs | default(omit) }}"
    name: "{{ item.name | default(omit) }}"
    value: "{{ item.value | default(omit) }}"
    state: "{{ item.state | default('present') }}"
    use_gssapi: "{{ item.use_gssapi | default(omit) }}"
    updated_name: "{{ item.updated_name | default(omit) }}"    
    hidden_value: "{{ item.hidden_value | default(omit) }}"
    parameter_type: "{{ item.parameter_type | default(omit) }}"
  loop: "{{ global_parameters }}"