satellite_domains:
- name: lab.lou
satellite_subnets:
- name: 192.168.111.0
  description: My Lab
  network: "192.168.111.0"
  mask: "255.255.255.0"
  gateway: "192.168.111.1"
  ipam: DHCP
  boot_mode: DHCP
  dhcp_proxy: satellite.lab.lou
  tftp_proxy: satellite.lab.lou
  domains:
  - lab.lou
  organizations:
  - hallas
  locations:
  - "memphis"

network_connections:
- name: enp1s0
  interface_name: enp1s0
  type: ethernet
  state: up
  autoconnect: true
  ip:
    dhcp4: false
    auto6: false
    address:
    - 192.168.11.11/24
    gateway4: 192.168.11.1
    dns: 192.168.11.1
    dns_search: lab.lou
- name: enp2s0
  interface_name: enp2s0
  type: ethernet
  state: up
  autoconnect: true
  ip:
    dhcp4: false
    auto6: false
    address:
    - 192.168.111.11/24
    dns_search: lab.lou

firewall:
- service: http
  state: enabled
- service: https
  state: enabled
- service: puppetmaster
  state: enabled