manage_users:
- username: foreman-compute
  password: redhat
  state: present
  comment: "Access to Hypervisor"
  update_password: always
  shell: /bin/bash
  ssh_keypair:
    private_key: "{{ foreman_compute_private_key}}"
    public_key: ssh-rsa 
    private_key_file: private_key
    public_key_file: public_key.pub
  ssh_config:
    manage: true
    host: "*"