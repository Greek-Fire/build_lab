manage_users:
- username: foreman
  system: true
  home: /usr/share/foreman
  create_home: false
  host_2_scan: 192.168.11.1
  ssh_keypair:
    private_key: "{{ foreman_private_key }}"
    public_key: ssh-rsa 
    private_key_file: private_key
    public_key_file: public_key.pub
  ssh_config:
    manage: true
    host: "*"